name: Aerial Classifier CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Lint & Syntax Check ──────────────────────────────────
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linters
        run: |
          pip install flake8 black isort
          
      - name: Flake8 (syntax errors only)
        run: flake8 src/ scripts/ app/ yolov8/ --max-line-length=110 --ignore=E501,W503

      - name: Black format check
        run: black --check --line-length=110 src/ scripts/ app/ yolov8/
        continue-on-error: true  # Don't fail on formatting only

  # ── Unit Tests ───────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install minimal deps
        run: |
          pip install pytest numpy Pillow PyYAML

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # Tests may need TF

  # ── Import check ─────────────────────────────────────────
  import-check:
    name: Import & Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install core deps
        run: pip install numpy Pillow PyYAML scikit-learn pandas

      - name: Check config imports
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          # Config only imports stdlib
          import importlib.util
          spec = importlib.util.spec_from_file_location('config', 'src/config.py')
          mod  = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print('Config OK — IMG_SIZE:', mod.IMG_SIZE)
          print('Config OK — CLASSES:',  mod.CLASSES)
          print('Config OK — EPOCHS:',   mod.EPOCHS)
          "

      - name: Check data.yaml
        run: |
          python -c "
          import yaml
          with open('yolov8/data.yaml') as f:
              cfg = yaml.safe_load(f)
          assert cfg['nc'] == 2, 'nc should be 2'
          assert 'bird' in cfg['names'].values(), 'bird class missing'
          assert 'drone' in cfg['names'].values(), 'drone class missing'
          print('data.yaml OK:', cfg)
          "

      - name: Check directory structure
        run: |
          python -c "
          import os
          required = [
            'src/config.py', 'src/utils.py', 'src/data_preprocessing.py',
            'src/custom_cnn.py', 'src/transfer_learning.py',
            'src/evaluate.py', 'src/predict.py',
            'app/streamlit_app.py',
            'yolov8/data.yaml', 'yolov8/train_yolo.py',
            'scripts/train_all.py', 'scripts/demo.py',
            'requirements.txt', 'README.md',
          ]
          for f in required:
            assert os.path.exists(f), f'Missing: {f}'
            print(f'OK: {f}')
          print('All required files present!')
          "

  # ── Docker Build ─────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build --no-cache -t aerial-classifier:test . \
            --build-arg BUILDKIT_INLINE_CACHE=1
        timeout-minutes: 20
        continue-on-error: true  # Docker build is optional in CI
